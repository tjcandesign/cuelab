<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="robots" content="noindex, nofollow" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CueLab — enter password</title>
<style>
  :root { --bg:#0b0b10; --panel:#15151c; --border:#26262f; --text:#e8e8ef; --dim:#8b8b98; --accent:#8b5cf6; --danger:#f87171; --mono: ui-monospace, 'SF Mono', Menlo, monospace; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height:100vh; display:grid; place-items:center; -webkit-font-smoothing:antialiased; }
  .glow { position:fixed; left:50%; top:-30%; transform:translateX(-50%); width:900px; height:600px; background:radial-gradient(closest-side, rgba(139,92,246,0.16), transparent 70%); pointer-events:none; }
  .card { position:relative; width:360px; max-width:calc(100vw - 40px); background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:34px 30px; }
  .wordmark { font-weight:700; font-size:20px; display:flex; align-items:center; gap:9px; margin-bottom:22px; }
  .wordmark .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); }
  .wordmark em { font-style:normal; color:var(--accent); }
  .micro { font-family:var(--mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim); margin-bottom:10px; }
  p.hint { color:var(--dim); font-size:13.5px; margin-bottom:20px; line-height:1.5; }
  label { display:block; }
  input { width:100%; background:#0d0d13; border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:15px; padding:12px 14px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { width:100%; margin-top:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; padding:12px; cursor:pointer; }
  button:hover { filter:brightness(1.1); }
  .err { display:none; color:var(--danger); font-size:13px; margin-top:12px; }
  .err.show { display:block; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="wordmark"><span class="dot"></span>Cue<em>Lab</em></div>
    <div class="micro">Private preview</div>
    <p class="hint">This page is password protected. Enter the password to continue.</p>
    <form method="POST" action="/api/login">
      <label>
        <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
      </label>
      <button type="submit">Enter</button>
      <div class="err" id="err">That password didn't match. Try again.</div>
    </form>
  </div>
  <script>
    if (location.search.indexOf('e=1') !== -1) document.getElementById('err').classList.add('show');
  </script>
</body>
</html>
